<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Master Quiz | Cyber Security Simulation</title>
    <!-- Google Fonts: Orbitron for titles, Poppins for text -->
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-glow: #00f2ff;
            --secondary-glow: #ff003c;
            --bg-dark: #020617;
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(0, 242, 255, 0.3);
            --text-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Prevent scrolls during animation */
            position: relative;
        }

        /* Moving Grid Background */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            z-index: -2;
        }

        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image:
                linear-gradient(var(--glass-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
            z-index: -1;
            opacity: 0.3;
        }

        @keyframes grid-move {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px);
            }
        }

        /* Glowing Particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: var(--primary-glow);
            border-radius: 50%;
            filter: blur(2px);
            animation: float-up var(--duration) linear infinite;
            opacity: 0.5;
        }

        @keyframes float-up {
            from {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            50% {
                opacity: 0.8;
            }

            to {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* Main Container */
        .quiz-container {
            width: 90%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15), inset 0 0 20px rgba(0, 242, 255, 0.05);
            position: relative;
            z-index: 10;
            animation: fade-in 1s ease-out;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1.5px solid var(--primary-glow);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
            object-fit: cover;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header & HUD */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-family: 'Orbitron', sans-serif;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .timer-box {
            color: var(--secondary-glow);
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--secondary-glow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-box {
            color: var(--primary-glow);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* Question Styles */
        .question-box {
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.4rem;
            line-height: 1.4;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .options-grid {
            display: grid;
            gap: 15px;
        }

        .option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.05rem;
        }

        .option:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--primary-glow);
            transform: translateX(10px);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .option.correct {
            border-color: #00ff41;
            background: rgba(0, 255, 65, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .option.wrong {
            border-color: var(--secondary-glow);
            background: rgba(255, 0, 60, 0.15);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.3);
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        /* Result Screen */
        .result-screen {
            text-align: center;
            display: none;
        }

        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 4rem;
            font-family: 'Orbitron', sans-serif;
            margin: 20px 0;
            color: var(--primary-glow);
        }

        .result-message {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--primary-glow);
            color: var(--primary-glow);
            padding: 12px 30px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: var(--primary-glow);
            color: #000;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn.secondary {
            border-color: #64748b;
            color: #64748b;
        }

        .btn.secondary:hover {
            background: #64748b;
            color: #fff;
            box-shadow: 0 0 20px #64748b;
        }

        /* Boom Animation */
        .boom {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: var(--primary-glow);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 1000;
            animation: explode 0.8s ease-out forwards;
            display: none;
        }

        @keyframes explode {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(100);
                opacity: 0;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-glow);
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .quiz-container {
                padding: 25px;
            }

            .result-title {
                font-size: 1.8rem;
            }

            .question-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>

    <div class="background-container">
        <div class="grid"></div>
        <div class="particles" id="particles"></div>
    </div>

    <div class="boom" id="boom"></div>

    <div class="quiz-container" id="quiz-container">
        <!-- HUD Row -->
        <div class="hud" style="display: flex; align-items: center; gap: 20px;">
            <img src="logo.jpeg" alt="Logo" class="logo-img">
            <div style="flex-grow: 1; display: flex; justify-content: space-between; align-items: center;">
                <div class="score-box">MARKS: <span id="current-score">0</span>/100</div>
                <div class="timer-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span id="timer">60</span>s
                </div>
            </div>

            <!-- Quiz Screen -->
            <div id="quiz-screen">
                <div class="question-box">
                    <div id="q-number"
                        style="color: var(--primary-glow); font-family: 'Orbitron'; margin-bottom: 10px;">
                        QUESTION 1/10</div>
                    <h2 class="question-text" id="q-text">Initialising system...</h2>
                </div>
                <div class="options-grid" id="options-list">
                    <!-- Options injected here -->
                </div>
            </div>

            <!-- Result Screen -->
            <div class="result-screen" id="result-screen">
                <h1 class="result-title" id="final-title">ANALYSIS COMPLETE</h1>
                <div class="result-score" id="final-score">0</div>
                <p class="result-message" id="final-message">Loading verdict...</p>
                <div class="button-group" id="btn-group">
                    <!-- Dynamic buttons here -->
                </div>
            </div>
        </div>

        <!-- Audio Elements -->
        <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
        <audio id="sound-wrong" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
        <audio id="sound-boom" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

        <script>
            // --- Questions Database ---
            const questionsDB = [
                {
                    q: "You receive an email from 'IT Support' asking you to click a link to verify your password immediately or your account will be deleted. What is the red flag?",
                    o: ["The email is personalized", "Extreme urgency and threat of account deletion", "The email has a professional logo", "It was sent during working hours"],
                    a: 1 // Index of correct option
                },
                {
                    q: "What is the safest way to check if a link in an email is legitimate without clicking it?",
                    o: ["Ask a colleague", "Hover your mouse over the link to see the actual URL", "Right-click and 'Open in New Tab'", "Reply to the email and ask"],
                    a: 1
                },
                {
                    q: "Which of these URLs is most likely a phishing site for 'PayPal'?",
                    o: ["https://www.paypal.com/login", "https://paypal-security-update.com", "https://www.paypal.co.uk", "https://mobile.paypal.com"],
                    a: 1
                },
                {
                    q: "What does Multi-Factor Authentication (MFA) prevent?",
                    o: ["Computer viruses", "All phishing attempts", "Unauthorized access even if a password is stolen", "Spam emails"],
                    a: 2
                },
                {
                    q: "What is 'Smishing'?",
                    o: ["Phishing via Social Media", "Phishing via SMS / Text messages", "Phishing via Voice calls", "Fake WiFi hotspots"],
                    a: 1
                },
                {
                    q: "A website has a padlock icon in the address bar. What does this mean?",
                    o: ["The website is 100% safe and verified", "The connection is encrypted, but the site could still be malicious", "The site is owned by a government agency", "Your antivirus is currently scanning the site"],
                    a: 1
                },
                {
                    q: "What is 'Spear Phishing'?",
                    o: ["A random attack on millions of people", "A targeted attack on a specific individual or organization", "Using a physical device to steal data", "Phishing through online gaming"],
                    a: 1
                },
                {
                    q: "An email from 'Amazon' has several spelling and grammar mistakes. What should you assume?",
                    o: ["Amazon is having a bad day", "The email is likely a phishing attempt", "It's an automated translation error", "The email is exclusive and high-priority"],
                    a: 1
                },
                {
                    q: "What is the 'Homograph' attack in phishing?",
                    o: ["Using physical mail to phish", "Using similar-looking characters (like 'o' and '0') in a domain name", "Phishing by calling someone's home phone", "Hiding malicious code in image files"],
                    a: 1
                },
                {
                    q: "You get a call from someone claiming to be from your bank's fraud department. They ask for your PIN to 'verify' you. What is this?",
                    o: ["Standard bank procedure", "Vishing (Voice Phishing)", "An ethical hacking test", "A helpful service"],
                    a: 1
                }
            ];

            // --- State Variables ---
            let resultsLog = [];

            // Global click sound
            const btnClickSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
            document.addEventListener('click', (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
                    btnClickSound.currentTime = 0;
                    btnClickSound.play().catch(() => { });
                }
            });

            let questions = [];
            let currentIdx = 0;
            let score = 0;
            let timerSeconds = 60;
            let timerInterval;
            let canClick = true;

            // --- Elements ---
            const uiQuizScreen = document.getElementById('quiz-screen');
            const uiResultScreen = document.getElementById('result-screen');
            const uiQText = document.getElementById('q-text');
            const uiQNumber = document.getElementById('q-number');
            const uiOptions = document.getElementById('options-list');
            const uiScore = document.getElementById('current-score');
            const uiTimer = document.getElementById('timer');
            const uiBoom = document.getElementById('boom');

            // Sounds
            const sndCorrect = document.getElementById('sound-correct');
            const sndWrong = document.getElementById('sound-wrong');
            const sndBoom = document.getElementById('sound-boom');

            // --- Initialization ---
            function init() {
                createParticles();
                startQuiz();
            }

            function createParticles() {
                const container = document.getElementById('particles');
                for (let i = 0; i < 30; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
                    p.style.setProperty('--duration', (Math.random() * 5 + 5) + 's');
                    p.style.animationDelay = (Math.random() * 5) + 's';
                    container.appendChild(p);
                }
            }

            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // --- Core Logic ---
            function startQuiz() {
                // Shuffle questions and options
                questions = shuffle([...questionsDB]).map(q => {
                    const options = q.o.map((text, idx) => ({ text, isCorrect: idx === q.a }));
                    return { ...q, shuffledOptions: shuffle(options) };
                }).slice(0, 10);

                currentIdx = 0;
                score = 0;
                timerSeconds = 60;
                canClick = true;

                uiScore.innerText = "0";
                uiTimer.innerText = "60";
                uiQuizScreen.style.display = 'block';
                uiResultScreen.style.display = 'none';

                loadQuestion();
                startTimer();
            }

            function startTimer() {
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    uiTimer.innerText = timerSeconds;

                    if (timerSeconds <= 0) {
                        clearInterval(timerInterval);
                        endQuiz();
                    }
                }, 1000);
            }

            function loadQuestion() {
                if (currentIdx >= questions.length) {
                    endQuiz();
                    return;
                }

                const qData = questions[currentIdx];
                uiQNumber.innerText = `QUESTION ${currentIdx + 1}/10`;
                uiQText.innerText = qData.q;

                uiOptions.innerHTML = '';
                qData.shuffledOptions.forEach((opt, idx) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.innerHTML = `<span style="color:var(--primary-glow); font-family:Orbitron;">0${idx + 1}</span> ${opt.text}`;
                    div.onclick = () => handleSelection(div, opt.isCorrect);
                    uiOptions.appendChild(div);
                });
                canClick = true;
            }

            function handleSelection(element, isCorrect) {
                if (!canClick) return;
                canClick = false;

                if (isCorrect) {
                    element.classList.add('correct');
                    score += 10;
                    uiScore.innerText = score;
                    sndCorrect.currentTime = 0;
                    sndCorrect.play().catch(() => { });
                } else {
                    element.classList.add('wrong');
                    // Show the correct one
                    Array.from(uiOptions.children).forEach(child => {
                        const optText = child.innerText.substring(3); // Remove prefix
                        const isActuallyCorrect = questions[currentIdx].shuffledOptions.find(o => o.text === optText)?.isCorrect;
                        if (isActuallyCorrect) child.classList.add('correct');
                    });
                    sndWrong.currentTime = 0;
                    sndWrong.play().catch(() => { });
                }

                setTimeout(() => {
                    currentIdx++;
                    loadQuestion();
                }, 1500);
            }

            function endQuiz() {
                clearInterval(timerInterval);
                uiQuizScreen.style.display = 'none';
                uiResultScreen.style.display = 'block';

                const finalTitle = document.getElementById('final-title');
                const finalScore = document.getElementById('final-score');
                const finalMsg = document.getElementById('final-message');
                const btnGroup = document.getElementById('btn-group');

                finalScore.innerText = score;
                btnGroup.innerHTML = '';

                if (score >= 70) {
                    finalTitle.innerText = "CONGRATULATIONS!";
                    finalTitle.style.color = "#00ff41";
                    finalMsg.innerText = "You have demonstrated mastery in phishing awareness. You are a Cyber Sentinel!";

                    // Boom Effect
                    uiBoom.style.display = 'block';
                    sndBoom.play().catch(() => { });
                    setTimeout(() => uiBoom.style.display = 'none', 800);

                    const playBtn = document.createElement('button');
                    playBtn.className = 'btn';
                    playBtn.innerText = "Play Again";
                    playBtn.onclick = startQuiz;
                    btnGroup.appendChild(playBtn);
                } else {
                    finalTitle.innerText = "SYSTEM FAILURE";
                    finalTitle.style.color = "var(--secondary-glow)";
                    finalMsg.innerText = "You need 70+ marks to pass this certification. Your awareness level is critical.";

                    const tryBtn = document.createElement('button');
                    tryBtn.className = 'btn';
                    tryBtn.innerText = "Try Again";
                    tryBtn.onclick = startQuiz;

                    const quitBtn = document.createElement('button');
                    quitBtn.className = 'btn secondary';
                    quitBtn.innerText = "Back to Learn";
                    quitBtn.onclick = () => location.href = 'lessons.html';

                    btnGroup.appendChild(tryBtn);
                    btnGroup.appendChild(quitBtn);
                }
            }

            window.onload = init;
        </script>
</body>

</html>
